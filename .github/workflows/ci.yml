name: CI/CD — Build, Test & Docker Publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Compilar y ejecutar pruebas ──────────────────────────
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar JDK 21 con caché Maven
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Compilar y ejecutar pruebas con cobertura
        run: mvn clean verify

      - name: Publicar reporte JaCoCo como artefacto
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 7

  # ── Job 2: Construir y publicar imagen en Docker Hub ─────────────
  docker-publish:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == "refs/heads/main" && github.event_name == "push"
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Autenticarse en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extraer metadata para tags de imagen
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/mi-spring-app
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Construir y publicar imagen multi-platform
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

